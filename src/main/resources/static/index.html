<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-bg">
        <div class="auth-bg-shape shape-1"></div>
        <div class="auth-bg-shape shape-2"></div>
        <div class="auth-bg-shape shape-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1>Finance Dashboard</h1>
                <p class="auth-subtitle">Manage your finances with precision</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="admin@finance.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <p class="auth-switch">
                    Don't have an account? <a href="#" onclick="toggleAuth(event)">Register</a>
                </p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regName"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Create Account</span>
                    <i class="fas fa-user-plus"></i>
                </button>
                <p class="auth-switch">
                    Already have an account? <a href="#" onclick="toggleAuth(event)">Sign In</a>
                </p>
            </form>

            <div id="authError" class="alert alert-error" style="display:none"></div>

            <div class="demo-credentials">
                <p><strong>Demo Accounts:</strong></p>
                <div class="demo-list">
                    <span class="demo-item" onclick="fillCredentials('admin@finance.com','admin123')">
                        <i class="fas fa-shield-halved"></i> Admin
                    </span>
                    <span class="demo-item" onclick="fillCredentials('analyst@finance.com','analyst123')">
                        <i class="fas fa-chart-bar"></i> Analyst
                    </span>
                    <span class="demo-item" onclick="fillCredentials('viewer@finance.com','viewer123')">
                        <i class="fas fa-eye"></i> Viewer
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
